name: crawler

on:
  schedule:
    - cron: "0 2 * * *"   # 每天 UTC 02:00（北京时间 10:00）
  workflow_dispatch:        # 支持 Actions 界面手动触发

jobs:
  yc:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/crawler/requirements.txt

      - name: 安装依赖
        run: pip install -r scripts/crawler/requirements.txt

      - name: 运行 YC 爬虫
        env:
          SUPABASE_URL:            ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FEISHU_ALERT_WEBHOOK:    ${{ secrets.FEISHU_ALERT_WEBHOOK }}
        run: python scripts/crawler/yc.py
