name: crawler

on:
  schedule:
    - cron: "0 2 * * *"   # 每天 UTC 02:00（北京时间 10:00）自动执行
  workflow_dispatch:        # 支持 Actions 界面手动触发
    inputs:
      source:
        description: "指定数据源 key（留空 = 全部已启用）"
        required: false
        default: ""
      dry_run:
        description: "dry-run 模式：只解析不写入 Supabase"
        type: boolean
        default: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/crawler/requirements.txt

      - name: 安装依赖
        run: pip install -r scripts/crawler/requirements.txt

      - name: 运行爬虫调度器
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FEISHU_ALERT_WEBHOOK:      ${{ secrets.FEISHU_ALERT_WEBHOOK }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.source }}" ]; then
            ARGS="$ARGS --source ${{ github.event.inputs.source }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/crawler/run.py $ARGS
