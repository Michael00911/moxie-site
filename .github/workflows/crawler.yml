name: crawler

on:
  schedule:
    - cron: "0 2 * * *"   # 每天 UTC 02:00（北京时间 10:00）自动执行
  workflow_dispatch:        # 支持 Actions 界面手动触发
    inputs:
      source:
        description: "指定数据源 key（留空 = 全部已启用）"
        required: false
        default: ""
      dry_run:
        description: "dry-run 模式：只解析不写入 Supabase"
        type: boolean
        default: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/crawler/requirements.txt

      - name: 安装依赖
        run: pip install -r scripts/crawler/requirements.txt

      - name: 运行爬虫调度器
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FEISHU_ALERT_WEBHOOK:      ${{ secrets.FEISHU_ALERT_WEBHOOK }}
          INPUT_SOURCE:              ${{ github.event.inputs.source }}
          INPUT_DRY_RUN:             ${{ github.event.inputs.dry_run }}
        run: |
          EXTRA_ARGS=()
          [ -n "$INPUT_SOURCE"        ] && EXTRA_ARGS+=(--source "$INPUT_SOURCE")
          [ "$INPUT_DRY_RUN" = "true" ] && EXTRA_ARGS+=(--dry-run)
          python scripts/crawler/run.py "${EXTRA_ARGS[@]}"
